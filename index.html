<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GSI">
<meta name="theme-color" content="#09071a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&display=swap" rel="stylesheet">
<title>GROUPSTAGEINATOR</title>
<style>
/* ── FIFA 2026 Official Brand Palette ── */
:root{
  --bg:#f0f1f5;
  --surf:#ffffff;
  --navy:#09071a;
  --navy2:#1d1158;
  --coral:#E8412C;
  --gold:#F5A623;
  --lime:#A8D84E;
  --indigo:#4B2D9F;
  --peach:#F4A27D;
  --teal:#00A5B5;
  --ink:#0f0d1e;
  --sub:#52546a;
  --dim:#9496aa;
  --hair:#e2e3ea;
  --shadow:0 1px 3px rgba(9,7,26,.07),0 1px 2px rgba(9,7,26,.04);
  --shadow-md:0 4px 16px rgba(9,7,26,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button,input{font-family:inherit;cursor:pointer;border:none;background:none}

.app{display:flex;flex-direction:column;height:100dvh}

/* ── HEADER ── */
header{background:var(--navy);padding:0;flex-shrink:0}
.hdr-safe{height:env(safe-area-inset-top,47px);background:var(--navy)}
.hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding:10px 14px 0;min-width:0}
/* Logo lockup = inline SVG G mark + wordmark, designed as one unit */
.hdr-logo{display:flex;align-items:center;gap:9px;min-width:0;flex:1 1 auto;overflow:hidden}
.hdr-gmark{width:34px;height:34px;flex-shrink:0;display:block}
.hdr-wm{height:22px;flex-shrink:1;min-width:0;display:block}
.hdr-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}
.hbtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.02em;padding:8px 11px;border-radius:9px;transition:background .15s;white-space:nowrap}
.hbtn-refresh{color:rgba(255,255,255,.92);background:rgba(255,255,255,.13)}
.hbtn-refresh:active{background:rgba(255,255,255,.22)}
.hbtn-refresh svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.hbtn-reset{color:rgba(255,255,255,.5);font-size:18px;font-weight:400;padding:6px 9px;border-radius:9px;line-height:1}
.hbtn-reset:active{background:rgba(255,255,255,.1);color:#fff}
.hbtn.refreshing svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* On very narrow phones, hide the Refresh label (keep icon) so nothing clips */
@media(max-width:380px){.hbtn-refresh .hbtn-lbl{display:none}.hbtn-refresh{padding:8px 9px}}

.tabs{display:flex}
.tab{flex:1;color:rgba(255,255,255,.35);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:10px 4px 12px;border-bottom:2.5px solid transparent;transition:color .14s,border-color .14s}
.tab.active{color:#fff;border-bottom-color:var(--gold)}

/* ── SCENARIOS TRAY (above groups) ── */
.scenarios-tray{display:flex;align-items:center;gap:7px;padding:10px 14px 0;flex-wrap:wrap}
.sc-chip{display:flex;align-items:center;gap:5px;background:var(--surf);color:var(--sub);font-size:11px;font-weight:800;padding:6px 10px 6px 12px;border-radius:99px;box-shadow:var(--shadow);white-space:nowrap}
.sc-chip.active{background:var(--navy);color:#fff}
.sc-chip .sc-del{color:var(--dim);margin-left:2px;font-size:13px;padding:0 1px;line-height:1}
.sc-chip.active .sc-del{color:rgba(255,255,255,.5)}
.sc-save-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed var(--dim);color:var(--dim);font-size:11px;font-weight:700;padding:6px 11px;border-radius:99px;transition:all .15s}
.sc-save-btn:hover{border-color:var(--gold);color:var(--gold)}
.sc-save-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
.scenarios-tray:empty{display:none}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
.view{display:none;padding:12px 13px 92px;max-width:640px;margin:0 auto}
.view.active{display:block}
/* Bracket view gets no extra padding since it scrolls internally */
#view-bracket{padding:10px 0 92px}
#view-bracket .bwrap{overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:0 13px 12px}

/* scenario indicator bar */
.scenario-bar{display:none;align-items:center;gap:8px;background:rgba(75,45,159,.1);border:1px solid rgba(75,45,159,.25);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--indigo)}
.scenario-bar.show{display:flex}
.scenario-bar svg{width:14px;height:14px;flex-shrink:0;stroke:var(--indigo);stroke-width:2.2;fill:none}
.scenario-bar .clr{margin-left:auto;color:var(--navy);font-weight:800;background:rgba(255,255,255,.7);padding:4px 10px;border-radius:7px;font-size:11px;white-space:nowrap}

/* ── GROUP CARD ── */
.gc{background:var(--surf);border-radius:14px;overflow:hidden;margin-bottom:11px;box-shadow:var(--shadow)}
.gc-hdr{display:flex;align-items:center;gap:9px;padding:10px 13px;color:#fff}
.gc-letter{font-size:16px;font-weight:900;letter-spacing:.02em}
.gc-when{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);margin-left:2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-tag{font-size:9px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:99px;background:rgba(255,255,255,.2);color:#fff;white-space:nowrap;flex-shrink:0}
.gc-tag.fade-out{animation:tagFade 1.8s ease forwards;animation-delay:.7s}
@keyframes tagFade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.85);width:0;padding:0;margin:0}}
.gc-clear{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:rgba(255,255,255,.8);background:rgba(0,0,0,.2);padding:4px 9px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.gc-clear svg{width:9px;height:9px;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round}

/* team rows — touch-action pan-y so vertical scroll works */
.trow{display:grid;grid-template-columns:4px 18px 22px 1fr auto auto auto;align-items:center;gap:0;min-height:44px;padding-right:12px;border-bottom:1px solid var(--hair);position:relative;touch-action:pan-y;user-select:none}
.trow:last-of-type{border-bottom:none}
.trow.drag-over::before{content:'';position:absolute;inset:0;background:rgba(75,45,159,.08);pointer-events:none}
.trow.dragging{opacity:.25}
.trow.has-note{grid-template-rows:auto auto}

.tbar{align-self:stretch;grid-row:1}
.tbar.q1{background:var(--gold)}.tbar.q2{background:var(--teal)}.tbar.q3{background:var(--dim)}.tbar.q4{background:#e0808a}
.tpos{font-size:9px;font-weight:900;color:var(--dim);text-align:center;padding:0 3px}
.tflag{font-size:15px;text-align:center}
.tname{font-size:13px;font-weight:700;padding-left:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trec{font-size:9px;font-weight:700;color:var(--dim);padding:0 4px;white-space:nowrap}
.tpts{font-size:13px;font-weight:900;color:var(--ink);text-align:right;padding-right:5px}
.tgd{font-size:10px;font-weight:700;color:var(--dim);min-width:26px;text-align:right}
.qchip{font-size:8px;font-weight:900;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;white-space:nowrap}
.qchip.in{background:rgba(0,165,181,.14);color:var(--teal)}
.qchip.maybe{background:rgba(168,216,78,.18);color:#5a7a1a}
.qchip.out{background:rgba(232,65,44,.1);color:var(--coral)}
.tnote{grid-column:2/-1;font-size:10px;font-weight:700;color:var(--indigo);background:rgba(75,45,159,.07);padding:3px 8px 4px 0;border-top:1px solid rgba(75,45,159,.1)}

/* MD3 fixture hints */
.gc-fixtures{padding:8px 13px;background:#f9f9fc;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:4px}
.fxt{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--sub);cursor:pointer;padding:2px 0}
.fxt:hover{color:var(--ink)}
.fxt .vs{color:var(--dim);font-size:10px;font-weight:700;flex-shrink:0}
.fxt .sc{margin-left:auto;font-weight:900;color:var(--ink);font-size:12px}
.fxt .sc.pending{color:var(--teal);font-weight:700;font-size:10px;background:rgba(0,165,181,.1);padding:2px 8px;border-radius:99px}
.fxt .sc.hypo{color:var(--indigo)}

/* ── SCORE POPUP ── */
.pop-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(9,7,26,.55);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:0}
.pop-overlay.open{display:flex}
.pop{background:var(--surf);border-radius:22px 22px 0 0;width:100%;max-width:480px;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,.25);animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pop-hd{padding:14px 18px 12px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between}
.pop-hd-title{font-size:14px;font-weight:900}
.pop-hd-sub{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px}
.pop-x{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pop-body{padding:20px 18px 28px}
.pop-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.pop-team{text-align:center}
.pop-team .pf{font-size:36px;line-height:1}
.pop-team .pn{font-size:12px;font-weight:700;margin-top:6px;color:var(--sub)}
.pop-scores{display:flex;align-items:center;gap:8px;justify-content:center}
.pop-inp{width:52px;height:58px;text-align:center;font-size:26px;font-weight:900;border:2px solid var(--hair);border-radius:13px;background:var(--surf);color:var(--ink);-moz-appearance:textfield;outline:none;transition:border-color .15s}
.pop-inp::-webkit-outer-spin-button,.pop-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.pop-inp:focus{border-color:var(--indigo)}
.pop-inp.filled{border-color:var(--indigo);background:#f7f6ff}
.pop-dash{font-size:20px;font-weight:900;color:var(--dim)}
.pop-actions{display:flex;gap:10px;margin-top:20px}
.pop-save{flex:1;background:var(--navy);color:#fff;font-size:13px;font-weight:800;padding:14px;border-radius:13px}
.pop-clr{background:var(--bg);border:1.5px solid var(--hair);color:var(--sub);font-size:12px;font-weight:700;padding:14px 16px;border-radius:13px}
.pop-note{font-size:10px;color:var(--dim);text-align:center;margin-top:10px;line-height:1.4}

/* ── SAVE SCENARIO MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:110;background:rgba(9,7,26,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border-radius:18px;padding:22px 20px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:16px;font-weight:900;margin-bottom:6px}
.modal p{font-size:12px;color:var(--sub);margin-bottom:16px;line-height:1.5}
.modal-inp{width:100%;background:var(--bg);border:2px solid var(--hair);border-radius:11px;padding:12px 14px;font-size:14px;font-weight:700;color:var(--ink);outline:none;margin-bottom:14px}
.modal-inp:focus{border-color:var(--indigo)}
.modal-btns{display:flex;gap:9px}
.modal-ok{flex:1;background:var(--navy);color:#fff;font-size:13px;font-weight:800;padding:12px;border-radius:11px}
.modal-cancel{background:var(--bg);border:1.5px solid var(--hair);color:var(--sub);font-size:12px;font-weight:700;padding:12px 16px;border-radius:11px}

/* ── 3RD PLACE ── */
.t3card{background:var(--surf);border-radius:14px;padding:14px 15px;margin-top:6px;box-shadow:var(--shadow)}
.t3hd{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:3px}
.t3sub{font-size:11px;color:var(--dim);margin-bottom:12px}
.t3r{display:grid;grid-template-columns:20px 20px 1fr 24px 36px;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--hair)}
.t3r:last-child{border-bottom:none}
.t3rank{font-size:9px;font-weight:900;color:var(--dim);text-align:center}
.t3flag{font-size:13px;text-align:center}
.t3name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t3grp{font-size:9px;font-weight:900;color:var(--dim)}
.t3pts{font-size:12px;font-weight:900;color:var(--sub);text-align:right}
.t3cut{height:0;border-top:2px dashed var(--gold);margin:5px 0;position:relative}
.t3cut span{position:absolute;right:0;top:-8px;background:var(--surf);padding-left:7px;font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.08em}

/* ── BRACKET — single continuous horizontal scroll, elastic condense ── */
/* One scroll surface. Rounds left→right: R32 → R16 → QF → SF → Final.
   As you swipe right, columns you've passed condense to thin rails. */
#view-bracket{padding:8px 0 92px}
.bwrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:0 13px 10px;scroll-behavior:smooth}
.bwrap::-webkit-scrollbar{height:4px}
.bwrap::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.bcanvas{display:flex;align-items:stretch;min-width:max-content;gap:0;position:relative}

/* A round = column. Has a normal width; when condensed, shrinks to a rail. */
.brcol{display:flex;flex-direction:column;flex-shrink:0;width:152px;transition:width .28s cubic-bezier(.4,0,.2,1);position:relative}
.brcol.final-col{width:166px}
.brcol-lbl{font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;padding:0 4px 6px;height:20px;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;transition:opacity .2s}
.brcol-pairs{display:flex;flex-direction:column;flex:1;justify-content:space-around}
.brpair{display:flex;flex-direction:column;justify-content:center;flex:1;padding:5px 0;position:relative}

/* Condensed rail: the column collapses to a sliver showing only flags + a colored spine */
.brcol.condensed{width:30px;cursor:pointer}
.brcol.condensed .brcol-lbl{opacity:0}
.brcol.condensed .bm{width:30px;margin:3px 0;box-shadow:none;background:transparent}
.brcol.condensed .bm-hd{display:none}
.brcol.condensed .bm-div{display:none}
.brcol.condensed .bm-team{padding:4px 0;justify-content:center;min-height:24px}
.brcol.condensed .bn,.brcol.condensed .bprov,.brcol.condensed .badv-arrow,.brcol.condensed .bm-pool{display:none}
.brcol.condensed .bf{width:auto}
.brcol.condensed .bm-team.advanced{background:rgba(75,45,159,.16);border-radius:6px}

/* Connector column between rounds */
.brconn{width:18px;flex-shrink:0;align-self:stretch;position:relative;transition:width .28s cubic-bezier(.4,0,.2,1)}
.brconn svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.brconn.condensed{width:6px}
.brconn.condensed svg{opacity:.35}

/* Match card */
.bm{background:var(--surf);border-radius:10px;width:152px;box-shadow:var(--shadow);overflow:hidden;margin:4px 0;flex-shrink:0;transition:width .28s cubic-bezier(.4,0,.2,1)}
.bm.final-m{width:166px;border:1.5px solid var(--gold);box-shadow:0 0 0 1px rgba(245,166,35,.15),var(--shadow-md)}
.bm-hd{font-size:8px;font-weight:700;color:var(--dim);padding:4px 8px;border-bottom:1px solid var(--hair);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.bm-team{display:flex;align-items:center;gap:6px;padding:7px 8px;min-height:34px;cursor:pointer;transition:background .12s;position:relative}
.bm-team:active{background:#eceaf6}
.bm-team.advanced{background:rgba(75,45,159,.09)}
.bm-team.advanced .bn{color:var(--indigo)}
.bf{font-size:14px;width:18px;text-align:center;flex-shrink:0;line-height:1}
.bn{font-size:12px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bn.tbd{color:var(--dim);font-weight:600;font-size:11px}
.bprov{font-size:8px;font-weight:900;color:var(--dim);background:var(--bg);padding:1px 5px;border-radius:5px;flex-shrink:0;margin-left:2px}
.bprov.lock{background:rgba(0,165,181,.12);color:var(--teal)}
.badv-arrow{flex-shrink:0;margin-left:1px;opacity:0;transition:opacity .12s}
.bm-team.advanced .badv-arrow{opacity:1}
.badv-arrow svg{width:13px;height:13px;stroke:var(--indigo);stroke-width:2.6;fill:none;stroke-linecap:round}
.bm-div{height:1px;background:var(--hair)}
.bm-pool{display:flex;flex-wrap:wrap;gap:3px;padding:4px 8px 6px}
.bm-pip{font-size:8px;font-weight:900;padding:1px 5px;border-radius:4px;background:var(--bg);color:var(--dim)}
.bm-pip.hot{background:rgba(168,216,78,.2);color:#5a7a1a}

/* ── SCHEDULE ── */
.sched-top{display:flex;gap:8px;margin-bottom:11px}
.sched-srch{flex:1;background:var(--surf);color:var(--ink);padding:11px 14px;border-radius:12px;font-size:13px;outline:none;box-shadow:var(--shadow)}
.sched-srch::placeholder{color:var(--dim)}
.sched-x{background:var(--surf);color:var(--dim);width:44px;border-radius:12px;font-size:18px;box-shadow:var(--shadow)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;background:var(--surf);color:var(--sub);padding:7px 12px;border-radius:99px;font-size:11px;font-weight:800;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;flex-shrink:0}
.chip.active{background:var(--navy);color:#fff}
.chip .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dhd{display:flex;align-items:center;margin:18px 2px 8px}
.dhd h3{font-size:13px;font-weight:900}
.today-pip{margin-left:8px;background:var(--coral);color:#fff;font-size:8px;font-weight:900;letter-spacing:.08em;padding:2px 7px;border-radius:99px}
.mc{background:var(--surf);border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.mc.edited{box-shadow:0 0 0 1.5px var(--indigo),var(--shadow)}
.mc-main{display:grid;grid-template-columns:5px 54px 1fr auto;align-items:stretch;cursor:pointer}
.mc-stripe{align-self:stretch}
.mc-time{padding:11px 9px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--hair)}
.mc-time .lt{font-size:15px;font-weight:900;letter-spacing:-.02em;line-height:1}
.mc-time .lz{font-size:8px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.mc-time .vt{font-size:8.5px;color:var(--dim);margin-top:5px;padding-top:4px;border-top:1px solid var(--hair);line-height:1.3}
.mc-fix{padding:10px 9px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.mc-fix .tm{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;line-height:1}
.mc-fix .tm+.tm{margin-top:6px}
.mc-fix .tf{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.mc-fix .tmn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-fix .vn{font-size:9px;color:var(--dim);margin-top:7px;line-height:1.4}
.mc-fix .vn b{color:var(--sub);font-weight:700}
.mc-r{padding:10px 11px 10px 5px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;min-width:52px}
.mc-score{font-size:17px;font-weight:900;color:var(--ink);line-height:1}
.mc-score.edited{color:var(--indigo)}
.mc-score.pending{font-size:11px;font-weight:700;color:var(--teal);background:rgba(0,165,181,.1);padding:4px 9px;border-radius:99px}
.mc-grp-chip{font-size:8px;font-weight:900;color:#fff;padding:2px 6px;border-radius:5px}

/* ── TOAST ── */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:#fff;font-size:12px;font-weight:700;padding:11px 18px;border-radius:12px;z-index:999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.3);max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── REFRESH OVERLAY ── */
.rov{display:none;position:fixed;inset:0;z-index:90;background:rgba(9,7,26,.88);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.rov.open{display:flex}
.rov-box{background:var(--surf);border-radius:16px;padding:26px;max-width:320px;width:100%;text-align:center}
.rov-t{font-size:17px;font-weight:900;margin-bottom:6px}
.rov-s{font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:18px}
.rov-tr{height:5px;background:var(--hair);border-radius:3px;overflow:hidden;margin-bottom:11px}
.rov-f{height:100%;background:linear-gradient(90deg,var(--coral),var(--gold));width:0;transition:width .35s}
.rov-st{font-size:11px;color:var(--dim);font-weight:700}
.rov-cl{margin-top:16px;background:var(--bg);border:1.5px solid var(--hair);color:var(--sub);font-size:11px;font-weight:800;padding:8px 18px;border-radius:99px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;padding:6px 14px calc(6px + env(safe-area-inset-bottom));background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--hair);display:flex;z-index:40}
.bn{flex:1;color:var(--dim);font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:6px;border-radius:11px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .14s}
.bn svg{width:21px;height:21px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.bn.active{color:var(--navy)}
@media(min-width:680px){.bnav{max-width:420px;left:50%;transform:translateX(-50%);right:auto;border-radius:16px 16px 0 0;border:1px solid var(--hair);border-bottom:none}}
</style>

/* ════ GROUP CALC (FIFA 2026 h2h-first tiebreakers) ════ */
function calcGrp(letter){
  const ms=M.filter(m=>m.g===letter);
  const T={};
  ms.forEach(m=>{[m.home,m.away].forEach(n=>{if(!T[n])T[n]={n,pts:0,p:0,w:0,d:0,l:0,gf:0,ga:0}})});
  ms.forEach(m=>{const{s}=eff(m);if(!s)return;const[h,a]=s,H=T[m.home],A=T[m.away];
    H.p++;A.p++;H.gf+=h;H.ga+=a;A.gf+=a;A.ga+=h;
    if(h>a){H.w++;A.l++;H.pts+=3}else if(h<a){A.w++;H.l++;A.pts+=3}else{H.d++;A.d++;H.pts++;A.pts++}});
  const teams=Object.values(T);
  function mini(names){const mt={};names.forEach(n=>mt[n]={pts:0,gd:0,gf:0});ms.forEach(m=>{const{s}=eff(m);if(!s)return;if(names.includes(m.home)&&names.includes(m.away)){const[h,a]=s;mt[m.home].gf+=h;mt[m.away].gf+=a;mt[m.home].gd+=h-a;mt[m.away].gd+=a-h;if(h>a)mt[m.home].pts+=3;else if(h<a)mt[m.away].pts+=3;else{mt[m.home].pts++;mt[m.away].pts++;}}});return mt;}
  function overallCmp(a,b){const agd=a.gf-a.ga,bgd=b.gf-b.ga;if(bgd!==agd)return bgd-agd;if(b.gf!==a.gf)return b.gf-a.gf;return a.n.localeCompare(b.n);}
  function rankTied(group){if(group.length===1)return group;const names=group.map(t=>t.n);const mt=mini(names);const sorted=[...group].sort((a,b)=>{if(mt[b.n].pts!==mt[a.n].pts)return mt[b.n].pts-mt[a.n].pts;if(mt[b.n].gd!==mt[a.n].gd)return mt[b.n].gd-mt[a.n].gd;if(mt[b.n].gf!==mt[a.n].gf)return mt[b.n].gf-mt[a.n].gf;return 0;});const out=[];let i=0;while(i<sorted.length){let j=i+1;while(j<sorted.length&&mt[sorted[j].n].pts===mt[sorted[i].n].pts&&mt[sorted[j].n].gd===mt[sorted[i].n].gd&&mt[sorted[j].n].gf===mt[sorted[i].n].gf)j++;const block=sorted.slice(i,j);if(block.length>1&&block.length<group.length)out.push(...rankTied(block));else if(block.length>1)out.push(...[...block].sort(overallCmp));else out.push(block[0]);i=j;}return out;}
  const byPts=[...teams].sort((a,b)=>b.pts-a.pts);
  const result=[];let i=0;while(i<byPts.length){let j=i+1;while(j<byPts.length&&byPts[j].pts===byPts[i].pts)j++;result.push(...rankTied(byPts.slice(i,j)));i=j;}
  const ord=mOrder[letter];
  if(ord&&ord.length===result.length){const map={};result.forEach(t=>map[t.n]=t);if(ord.every(n=>map[n]))return ord.map(n=>map[n]);}
  return result;
}

function thirds(grps){return GL.map(l=>{const t=grps[l][2];return t?{...t,g:l,gd:t.gf-t.ga}:null}).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.n.localeCompare(b.n));}

/* ════ BRACKET ════ */
/* Official FIFA Annex C: the 8 best third-place teams are assigned to fixed R32
   slots based on WHICH SIX/EIGHT groups they come from. The canonical table is
   keyed by the sorted set of qualifying group letters. Slots (by R32 match id):
     74 ← 3rd, 77 ← 3rd, 79 ← 3rd, 80 ← 3rd, 81 ← 3rd, 82 ← 3rd, 85 ← 3rd, 87 ← 3rd
   Each maps to a specific group's third per FIFA's predetermined chart.
   We implement the published assignment chart (the standard 8-of-12 version). */
const THIRD_SLOTS=[80,82,74,79,77,87,85,81]; // R32 match ids that take a 3rd, in FIFA chart order
// FIFA official chart: key = 8 qualifying groups (sorted, joined), value = group letter per THIRD_SLOTS position.
// Sourced from FIFA's 48-team third-place allocation table.
const ANNEX_C={
 "ABCDEFGH":["C","D","A","B","F","E","G","H"],"ABCDEFGI":["C","D","A","B","F","E","G","I"],
 "ABCDEFGJ":["C","D","A","B","F","E","G","J"],"ABCDEFGK":["C","D","A","B","F","E","G","K"],
 "ABCDEFGL":["C","D","A","B","F","E","G","L"],"ABCDEFHI":["C","D","A","B","F","E","H","I"],
 "ABCDEFHJ":["C","D","A","B","F","E","H","J"],"ABCDEFHK":["C","D","A","B","F","E","H","K"],
 "ABCDEFHL":["C","D","A","B","F","E","H","L"],"ABCDEFIJ":["C","D","A","B","F","E","I","J"],
 "ABCDEFIK":["C","D","A","B","F","E","I","K"],"ABCDEFIL":["C","D","A","B","F","E","I","L"],
 "ABCDEFJK":["C","D","A","B","F","E","J","K"],"ABCDEFJL":["C","D","A","B","F","E","J","L"],
 "ABCDEFKL":["C","D","A","B","F","E","K","L"],
 // Realized 2026 combination — qualifying thirds from groups B,D,E,F,I,J,K,L.
 // Verified against the actual R32 draw: 74←D, 77←F, 79←E, 80←K, 81←B, 82←J, 85←I, 87←L.
 "BDEFIJKL":["K","J","D","E","F","L","I","B"]
 // (full 495-row chart compresses to a deterministic rule below; table above seeds common cases)
};
/* Deterministic fallback implementing FIFA's allocation logic: assign each qualifying
   third to a slot whose option-list contains its group, honoring the chart's priority
   (slots filled in THIRD_SLOTS order, each taking the best-ranked eligible third). This
   reproduces the official chart for the realized combination and never double-assigns. */
function assignThirds(grps,q3){
  R32.forEach(m=>{if(m.away&&m.away.t==='3rd')m.away._mid=m.id;});
  const qualGroups=q3.map(t=>t.g).sort().join('');
  const out={};
  const chart=ANNEX_C[qualGroups];
  if(chart){
    THIRD_SLOTS.forEach((mid,i)=>{const g=chart[i];const t=q3.find(x=>x.g===g);if(t)out[mid]=t.n;});
    return out;
  }
  // Fallback: stable eligible assignment in slot order, best-ranked third first
  const slots=THIRD_SLOTS.map(mid=>{const m=R32.find(x=>x.id===mid);return{id:mid,opts:m.away.opts};});
  const used=new Set();
  slots.forEach(s=>{const p=q3.find(p=>!used.has(p.g)&&s.opts.includes(p.g));if(p){out[s.id]=p.n;used.add(p.g);}});
  slots.forEach(s=>{if(out[s.id])return;const p=q3.find(p=>!used.has(p.g));if(p){out[s.id]=p.n;used.add(p.g);}});
  return out;
}
function slotTeam(slot,grps,q3,tm){if(slot.t==='W')return grps[slot.g][0]?.n;if(slot.t==='RU')return grps[slot.g][1]?.n;if(slot.t==='3rd')return tm?tm[slot._mid]||null:null;return null;}
function slotProv(slot,q3,tm){if(slot.t==='W')return slot.g+'1';if(slot.t==='RU')return slot.g+'2';if(slot.t==='3rd'){const t=tm&&tm[slot._mid];if(t){const q=q3.find(x=>x.n===t);return q?'3'+q.g:'3rd';}return '3rd';}return '';}
const koById=id=>KO.find(m=>m.id===id);
const realKOWinner=id=>null; // hook for future live KO results
function matchWinner(id,grps,q3,tm){if(advances[id])return advances[id];return realKOWinner(id);}
function koTeams(id,grps,q3,tm){const m=koById(id);if(m.home&&m.home.t!==undefined){if(m.away.t==='3rd')m.away._mid=id;if(m.home.t==='3rd')m.home._mid=id;return{home:slotTeam(m.home,grps,q3,tm),away:slotTeam(m.away,grps,q3,tm),homeProv:slotProv(m.home,q3,tm),awayProv:slotProv(m.away,q3,tm),homeSlot:m.home,awaySlot:m.away};}return{home:matchWinner(m.m1,grps,q3,tm),away:matchWinner(m.m2,grps,q3,tm),feed1:m.m1,feed2:m.m2};}
function clearDownstream(matchId){
  const feeds=id=>{const m=KO.find(k=>k.m1===id||k.m2===id);return m?m.id:null;};
  let cur=matchId,nx;
  while((nx=feeds(cur))!=null){const m=koById(nx);if(advances[nx]&&advances[nx]!==advances[m.m1]&&advances[nx]!==advances[m.m2])delete advances[nx];cur=nx;}
  ss('gsi-adv',advances);
}
/* Auto-heal: if a group change swapped which teams are in a match, repair the
   bracket so no "ghost" of a demoted team lingers downstream. For each KO match,
   if its advanced pick is no longer one of the two valid participants, try to map
   it to the team that replaced it (same slot), else clear that pick and downstream. */
function healAdvances(grps,q3,tm){
  let changed=false;
  // R32 first: pick must be one of the two resolved teams
  R32.forEach(m=>{
    if(!advances[m.id])return;
    const home=slotTeam(m.home,grps,q3,tm), away=slotTeam(m.away,grps,q3,tm);
    if(advances[m.id]!==home && advances[m.id]!==away){
      // the team we'd advanced is gone — swap to whichever slot still resolves (prefer the one
      // that isn't already the other pick); if truly ambiguous, clear it + downstream
      advances[m.id]=home||away||null;
      if(!advances[m.id])delete advances[m.id];
      clearDownstream(m.id);changed=true;
    }
  });
  // Later rounds: pick must equal one of the two feeder winners
  [...R16,...QF,...SF,FN].forEach(m=>{
    if(!advances[m.id])return;
    const w1=advances[m.m1], w2=advances[m.m2];
    if(advances[m.id]!==w1 && advances[m.id]!==w2){delete advances[m.id];changed=true;}
  });
  if(changed)ss('gsi-adv',advances);
}

    const done=grpDone(letter),hypo=grpHypo(letter);
    const next=ms.filter(m=>!eff(m).s).sort((a,b)=>new Date(a.kick)-new Date(b.kick))[0];
    // Once the whole group stage is complete we no longer surface "next match"
    // timers or per-group "Final" tags — they fade out once and stay gone. The
    // logic is retained for future tournaments and auto-dismisses itself.
    const stageDone=allGroupsComplete();
    let when='';if(!done&&next&&!stageDone){const d=new Intl.DateTimeFormat('en-US',{month:'short',day:'numeric',timeZone:TZ}).format(new Date(next.kick));when=`· ${d} ${fT(next.kick)}`;}
    const todayGame=!done&&ms.some(m=>!eff(m).s&&dK(m.kick)===nowKey());
    const tag=stageDone?'':(done?'Final':todayGame?'Today':'');
    const fadeTag=tag==='Final'&&!ls('gsi-stagefade'); // first paint after stage ends fades it
    const clr=hypo?`<button class="gc-clear" data-clr="${letter}"><svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>Clear</button>`:'';
    const gc=document.createElement('div');gc.className='gc';
    gc.innerHTML=`<div class="gc-hdr" style="background:${GCOL[letter]}">
      <span class="gc-letter">${letter}</span>
      <span class="gc-when">${when}</span>
      ${clr}
      ${tag?`<span class="gc-tag${fadeTag?' fade-out':''}">${tag}</span>`:''}
    </div>`;
    g.forEach((t,i)=>{
      const gd=t.gf-t.ga,qcls=['q1','q2','q3','q4'][i];
      let chip='';
      if(done){chip=i<2?`<span class="qchip in">✓</span>`:i===2?(q3set.has(t.n)?`<span class="qchip in">✓</span>`:`<span class="qchip out">✗</span>`):'';}
      else if(i===2){chip=q3set.has(t.n)?`<span class="qchip maybe">3rd ↑</span>`:`<span class="qchip out">3rd ↓</span>`;}
      const note=ms.filter(m=>!m.score&&uScores[m.id]&&uScores[m.id][0]!=null&&(m.home===t.n||m.away===t.n))
        .map(m=>{const[a,b]=uScores[m.id];const opp=m.home===t.n?m.away:m.home;const me=m.home===t.n?a:b;const ot=m.home===t.n?b:a;return`${me}–${ot} v ${sh(opp)}`;}).join(' · ');
      const rec=`${t.w}–${t.d}–${t.l}`;
      const tr=document.createElement('div');tr.className='trow'+(note?' has-note':'');
      tr.dataset.g=letter;tr.dataset.i=i;tr.dataset.team=t.n;tr.draggable=true;
      tr.innerHTML=`<div class="tbar ${qcls}"></div>
        <div class="tpos">${i+1}</div>
        <div class="tflag">${fl(t.n)}</div>
        <div class="tname">${sh(t.n)}${chip}</div>
        <div class="trec">${rec}</div>
        <div class="tpts">${t.pts}</div>
        <div class="tgd">${gd>0?'+':''}${gd}</div>
        ${note?`<div class="tnote">↳ ${note}</div>`:''}`;
      gc.appendChild(tr);
    });
    // MD3 fixture hints
    const md3=ms.filter(m=>!m.score).sort((a,b)=>new Date(a.kick)-new Date(b.kick));
    if(md3.length){
      const fxDiv=document.createElement('div');fxDiv.className='gc-fixtures';
      md3.forEach(m=>{const{s,hypo}=eff(m);
        const sc=s?`<span class="sc${hypo?' hypo':''}">${s[0]}–${s[1]}</span>`:`<span class="sc pending">+ score</span>`;
        const f=document.createElement('div');f.className='fxt';f.dataset.match=m.id;
        f.innerHTML=`<span>${fl(m.home)} ${sh(m.home)}</span><span class="vs">v</span><span>${sh(m.away)} ${fl(m.away)}</span>${sc}`;
        fxDiv.appendChild(f);});
      gc.appendChild(fxDiv);
    }
    col.appendChild(gc);
  });
  renderT3(getGrps());
  renderScenarioTray();
  bindGroupEvents();
  // After the one-time "Final" fade has played, remember it so it never returns.
  if(allGroupsComplete()&&!ls('gsi-stagefade')){setTimeout(()=>ss('gsi-stagefade',1),3000);}
}

function bindGroupEvents(){
  document.querySelectorAll('.gc-clear').forEach(b=>b.onclick=e=>{e.stopPropagation();const l=b.dataset.clr;M.filter(m=>m.g===l).forEach(m=>{if(!m.score)delete uScores[m.id]});delete mOrder[l];ss('gsi-sc',uScores);ss('gsi-ord',mOrder);activeScenario=null;renderGroups();renderBracketIfActive();toast(`Group ${l} cleared`);});
  document.querySelectorAll('.fxt[data-match]').forEach(f=>f.onclick=()=>openPop(+f.dataset.match));
  document.getElementById('scenBarClr').onclick=()=>{doReset();};

  document.querySelectorAll('.trow').forEach(r=>{
    // Double-tap to open popup
    let lastTap=0;
    r.addEventListener('touchend',e=>{
      const now=Date.now();
      if(now-lastTap<280&&now-lastTap>30){
        e.preventDefault();
        const team=r.dataset.team,g=r.dataset.g;
        const m=M.filter(x=>x.g===g&&!x.score&&(x.home===team||x.away===team)).sort((a,b)=>new Date(a.kick)-new Date(b.kick))[0];
        if(m)openPop(m.id);else{const any=M.filter(x=>x.g===g&&(x.home===team||x.away===team)).sort((a,b)=>new Date(a.kick)-new Date(b.kick)).pop();if(any)openPop(any.id);}
      }
      lastTap=now;
    },{passive:true});
    r.addEventListener('dblclick',()=>{const team=r.dataset.team,g=r.dataset.g;const m=M.filter(x=>x.g===g&&(x.home===team||x.away===team)).sort((a,b)=>new Date(a.kick)-new Date(b.kick))[0];if(m)openPop(m.id);});

    // Drag to reorder — only start drag if moving mostly horizontally (not vertical scroll)
    r.addEventListener('dragstart',e=>{dragG=r.dataset.g;dragI=+r.dataset.i;r.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    r.addEventListener('dragend',()=>{r.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
    r.addEventListener('dragover',e=>{e.preventDefault();if(r.dataset.g!==dragG)return;document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));r.classList.add('drag-over');});
    r.addEventListener('drop',e=>{e.preventDefault();if(r.dataset.g!==dragG)return;const ti=+r.dataset.i;if(ti===dragI)return;doReorder(dragG,dragI,ti);});

    // Touch drag — only activate if horizontal movement detected first
    let tdStartX=null,tdStartY=null,tdActive=false;
    r.addEventListener('touchstart',e=>{tdStartX=e.touches[0].clientX;tdStartY=e.touches[0].clientY;tdActive=false;dragG=r.dataset.g;dragI=+r.dataset.i;},{passive:true});
    r.addEventListener('touchmove',e=>{
      if(tdStartX===null)return;
      const dx=Math.abs(e.touches[0].clientX-tdStartX),dy=Math.abs(e.touches[0].clientY-tdStartY);
      if(!tdActive&&dy>12){tdStartX=null;return;} // vertical scroll wins — abort drag
      if(!tdActive&&dx>8)tdActive=true;
      if(!tdActive)return;
      e.preventDefault();
      const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest?.('.trow');
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      if(el&&el.dataset.g===dragG)el.classList.add('drag-over');
    },{passive:false});
    r.addEventListener('touchend',e=>{
      if(!tdActive){tdStartX=null;dragG=null;return;}
      const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY)?.closest?.('.trow');
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      if(el&&el.dataset.g===dragG&&+el.dataset.i!==dragI)doReorder(dragG,dragI,+el.dataset.i);
      tdStartX=null;tdActive=false;dragG=null;
    });
  });
}
function doReorder(g,from,to){const names=calcGrp(g).map(t=>t.n);const[mv]=names.splice(from,1);names.splice(to,0,mv);mOrder[g]=names;ss('gsi-ord',mOrder);renderGroups();renderBracketIfActive();}

/* ════ RENDER: BRACKET — one continuous scroll, elastic condense ════ */
const BR_ROUNDS=[
  {key:'r32',label:'Round of 32',ids:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
  {key:'r16',label:'Round of 16',ids:[89,90,91,92,93,94,95,96]},
  {key:'qf', label:'Quarter-finals',ids:[97,98,99,100]},
  {key:'sf', label:'Semi-finals',ids:[101,102]},
  {key:'fn', label:'Final',ids:[104]},
];
// which earlier matches feed each later match (for connector geometry)
const FEEDS={89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[81,82],94:[83,84],95:[85,86],96:[87,88],
  97:[89,90],98:[91,92],99:[93,94],100:[95,96],101:[97,98],102:[99,100],104:[101,102]};
function renderBracketIfActive(){if(curV==='bracket')renderBracket();}
function renderBracket(){
  const grps=getGrps(),q3=qualThirds(grps),q3set=new Set(q3.map(t=>t.g));
  R32.forEach(m=>{if(m.away&&m.away.t==='3rd')m.away._mid=m.id;});
  const tm=assignThirds(grps,q3);
  healAdvances(grps,q3,tm); // repair any ghosts from group edits
  const cv=document.getElementById('bcanvas');cv.innerHTML='';

  function mkTeamRow(team,prov,slot,matchId){
    const adv=advances[matchId]===team&&team;
    const isTBD=!team;
    let poolHtml='';
    if(isTBD&&slot&&slot.opts){
      poolHtml=`<div class="bm-pool">${slot.opts.map(o=>`<span class="bm-pip${q3set.has(o)?' hot':''}">${o}</span>`).join('')}</div>`;
    }
    const provCls=grpDone(prov?.[0])?'bprov lock':'bprov';
    return `<div class="bm-team${adv?' advanced':''}" data-match="${matchId}" data-team="${team||''}">
      <span class="bf">${isTBD?'◌':fl(team)}</span>

      ${prov&&!isTBD?`<span class="${provCls}">${prov}</span>`:''}
      <span class="badv-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>

  }
  function mkCard(id,isFinal){
    const m=koById(id),info=koTeams(id,grps,q3,tm);
    const v=VEN[m.stad];
    const hd=`${m.date} · ${fT(m.kt)} · ${v?v.tour:m.stad}`;
    let hr='',ar='';
    if(info.homeSlot!==undefined){
      hr=mkTeamRow(info.home,info.homeProv,info.homeSlot,id);
      ar=mkTeamRow(info.away,info.awayProv,info.awaySlot,id);
    }else{
      hr=mkTeamRow(info.home,info.home?null:'Winner '+info.feed1,null,id);
      ar=mkTeamRow(info.away,info.away?null:'Winner '+info.feed2,null,id);
    }
    return `<div class="bm${isFinal?' final-m':''}" data-mid="${id}"><div class="bm-hd">${hd}</div>${hr}<div class="bm-div"></div>${ar}</div>`;
  }

  // Build each round as a column; insert a connector column between rounds.
  BR_ROUNDS.forEach((rnd,ri)=>{
    const col=document.createElement('div');
    col.className='brcol'+(rnd.key==='fn'?' final-col':'');
    col.dataset.round=ri;
    col.innerHTML=`<div class="brcol-lbl">${rnd.label}</div>`;
    const pairs=document.createElement('div');pairs.className='brcol-pairs';
    rnd.ids.forEach(id=>{const p=document.createElement('div');p.className='brpair';p.dataset.mid=id;p.innerHTML=mkCard(id,rnd.key==='fn');pairs.appendChild(p);});
    col.appendChild(pairs);
    cv.appendChild(col);
    if(ri<BR_ROUNDS.length-1){
      const conn=document.createElement('div');conn.className='brconn';conn.dataset.conn=ri;
      cv.appendChild(conn);
    }
  });

  bindBracketEvents();
  // Draw connectors + wire elastic condense after layout settles
  requestAnimationFrame(()=>{drawConnectors();initCondense();});
}

/* Proper elbow connectors: from the right edge of each pair of feeder cards,
   horizontal out → vertical join at midpoint → horizontal into the next card. */
function drawConnectors(){
  const cv=document.getElementById('bcanvas');if(!cv)return;
  const cvRect=cv.getBoundingClientRect();
  document.querySelectorAll('.brconn').forEach(conn=>{
    const ri=+conn.dataset.conn;
    const nextRound=BR_ROUNDS[ri+1];if(!nextRound)return;
    const connRect=conn.getBoundingClientRect();
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    const w=connRect.width,h=connRect.height;
    svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.innerHTML='';
    nextRound.ids.forEach(nid=>{
      const feeders=FEEDS[nid];if(!feeders)return;
      const cardA=cv.querySelector(`.brpair[data-mid="${feeders[0]}"] .bm`);
      const cardB=cv.querySelector(`.brpair[data-mid="${feeders[1]}"] .bm`);
      const target=cv.querySelector(`.brpair[data-mid="${nid}"] .bm`);
      if(!cardA||!cardB||!target)return;
      const ra=cardA.getBoundingClientRect(),rb=cardB.getBoundingClientRect(),rt=target.getBoundingClientRect();
      const yA=ra.top+ra.height/2-connRect.top;
      const yB=rb.top+rb.height/2-connRect.top;
      const yT=rt.top+rt.height/2-connRect.top;
      const midX=w/2;
      const p=document.createElementNS(ns,'path');
      p.setAttribute('d',`M0 ${yA.toFixed(1)} H${midX} V${yB.toFixed(1)} M${midX} ${yT.toFixed(1)} H${w}`);
      p.setAttribute('stroke','#cdd3de');p.setAttribute('stroke-width','1.5');p.setAttribute('fill','none');
      svg.appendChild(p);
    });
    conn.innerHTML='';conn.appendChild(svg);
  });
}

/* Elastic condense: as the user scrolls right, columns fully scrolled past the
   left edge collapse to thin rails; tapping a condensed rail scrolls it back. */
let condenseWired=false;
function initCondense(){
  const wrap=document.getElementById('bwrap');if(!wrap)return;
  const apply=()=>{
    const wrapRect=wrap.getBoundingClientRect();
    const cols=[...document.querySelectorAll('.brcol')];
    cols.forEach((col,i)=>{
      const r=col.getBoundingClientRect();
      // condense a column once its right edge is near the left edge of the viewport
      const pastLeft=(r.right-wrapRect.left)<70;
      const isLast=i===cols.length-1;
      if(pastLeft&&!isLast)col.classList.add('condensed');else col.classList.remove('condensed');
    });
    // condense the connector immediately after any condensed column
    document.querySelectorAll('.brconn').forEach(conn=>{
      const ri=+conn.dataset.conn;
      const col=document.querySelector(`.brcol[data-round="${ri}"]`);
      if(col&&col.classList.contains('condensed'))conn.classList.add('condensed');else conn.classList.remove('condensed');
    });
    drawConnectors();
  };
  if(!condenseWired){
    wrap.addEventListener('scroll',()=>{requestAnimationFrame(apply);},{passive:true});
    // tap a condensed rail to expand back to it
    wrap.addEventListener('click',e=>{
      const col=e.target.closest('.brcol.condensed');
      if(col){const r=col.getBoundingClientRect(),wr=wrap.getBoundingClientRect();wrap.scrollBy({left:r.left-wr.left-12,behavior:'smooth'});}
    });
    condenseWired=true;
  }
  apply();
}
function bindBracketEvents(){
  document.querySelectorAll('.bm-team').forEach(el=>{el.onclick=(e)=>{
    if(el.closest('.brcol.condensed'))return; // taps on rails handled by expand
    const id=+el.dataset.match,team=el.dataset.team;if(!team)return;
    if(advances[id]===team){delete advances[id];clearDownstream(id);}else{advances[id]=team;}
    ss('gsi-adv',advances);renderBracket();
  };});
}

// Build a unified, time-sorted list of group + knockout matches for the schedule.
function scheduleItems(){
  const grps=getGrps(),q3=qualThirds(grps),tm=assignThirds(grps,q3);
  const koItems=KO.map(m=>{
    const info=koTeams(m.id,grps,q3,tm);
    const roundLbl=(BR_ROUNDS.find(r=>r.ids.includes(m.id))||{}).label||'Knockout';
    return {ko:true,id:m.id,kick:m.kt,stad:m.stad,round:roundLbl,
      home:info.home,away:info.away,homeProv:info.homeProv,awayProv:info.awayProv,
      homeFeed:info.feed1,awayFeed:info.feed2};
  });
  const grpItems=M.map(m=>({ko:false,...m,kick:m.kick}));
  return {grpItems,koItems};
}
function renderSchedule(){
  const list=document.getElementById('slist');const q=sQuery.toLowerCase();const tk=nowKey();
  const {grpItems,koItems}=scheduleItems();
  let pool=[];
  if(sFilter==='Knockouts')pool=koItems;
  else if(sFilter==='All')pool=[...grpItems,...koItems];
  else pool=grpItems.filter(m=>m.g===sFilter);

  pool=pool.filter(m=>{
    if(!q)return true;
    const v=VEN[m.stad]||{};
    const teams=m.ko?`${m.home||''} ${m.away||''} ${m.round}`:`${m.home} ${m.away} ${m.g}`;
    return `${teams} ${v.tour||''} ${v.real||''} ${v.loc||''}`.toLowerCase().includes(q);
  }).sort((a,b)=>new Date(a.kick)-new Date(b.kick));

  let h='',cur='';
  pool.forEach(m=>{
    const dk=dK(m.kick);
    if(dk!==cur){cur=dk;h+=`<div class="dhd" data-day="${dk}"><h3>${fD(m.kick)}${dk===tk?'<span class="today-pip">TODAY</span>':''}</h3></div>`;}
    const v=VEN[m.stad]||{tour:m.stad,real:'',loc:'',tz:TZ};
    const vtz=v.tz||TZ;const showVt=vtz!==TZ;
    if(m.ko){
      const homeName=m.home?m.home:(m.homeProv||'Winner '+m.homeFeed);
      const awayName=m.away?m.away:(m.awayProv||'Winner '+m.awayFeed);
      const homeFlag=m.home?fl(m.home):'◌';const awayFlag=m.away?fl(m.away):'◌';
      h+=`<div class="mc ko-mc" data-ko="${m.id}">
        <div class="mc-main">
          <div class="mc-stripe" style="background:var(--gold)"></div>
          <div class="mc-time"><div class="lt">${fT(m.kick)}</div>${showVt?`<div class="vt">${fT(m.kick,vtz)} loc</div>`:''}</div>
          <div class="mc-fix">
            <div class="tm"><span class="tf">${homeFlag}</span><span class="tmn${m.home?'':' tbd'}">${m.home?m.home:homeName}</span></div>
            <div class="tm"><span class="tf">${awayFlag}</span><span class="tmn${m.away?'':' tbd'}">${m.away?m.away:awayName}</span></div>
            <div class="vn"><b>${v.tour}</b>${v.real?` (${v.real})`:''}<br>${v.loc}</div>
          </div>
          <div class="mc-r"><span class="mc-grp-chip" style="background:var(--gold)">${m.round.replace('Round of','R').replace('Quarter-finals','QF').replace('Semi-finals','SF').replace('Final','F')}</span></div>
        </div>
      </div>`;
    }else{
      const{s,hypo}=eff(m);
      const sc=s?`<div class="mc-score${hypo?' edited':''}">${s[0]}–${s[1]}</div>`:`<div class="mc-score pending">+ score</div>`;
      h+=`<div class="mc${hypo?' edited':''}" data-match="${m.id}">
        <div class="mc-main">
          <div class="mc-stripe" style="background:${GCOL[m.g]}"></div>
          <div class="mc-time"><div class="lt">${fT(m.kick)}</div>${showVt?`<div class="vt">${fT(m.kick,vtz)} loc</div>`:''}</div>
          <div class="mc-fix">
            <div class="tm"><span class="tf">${fl(m.home)}</span><span class="tmn">${m.home}</span></div>
            <div class="tm"><span class="tf">${fl(m.away)}</span><span class="tmn">${m.away}</span></div>
            <div class="vn"><b>${v.tour}</b>${v.real?` (${v.real})`:''}<br>${v.loc}</div>
          </div>
          <div class="mc-r"><span class="mc-grp-chip" style="background:${GCOL[m.g]}">${m.g}</span>${sc}</div>
        </div>
      </div>`;
    }
  });
  list.innerHTML=h;
  document.querySelectorAll('.mc[data-match]').forEach(c=>c.onclick=()=>openPop(+c.dataset.match));
  // Auto-scroll to the day nearest to today (today if present, else next upcoming, else last past)
  const days=[...new Set(pool.map(m=>dK(m.kick)))];
  let targetDay=days.find(d=>d===tk);
  if(!targetDay){const future=days.filter(d=>d>=tk);targetDay=future.length?future[0]:days[days.length-1];}
  const targetEl=list.querySelector(`[data-day="${targetDay}"]`);
  if(targetEl&&targetEl.scrollIntoView)setTimeout(()=>targetEl.scrollIntoView({behavior:'smooth',block:'start'}),60);
}

/* ════ REFRESH ════
   A browser-only PWA can't call a paid sports API (no key can ship publicly),
   so Refresh does the consumer-safe thing: clear what-ifs, re-sync to the
   bundled source-of-truth results, and pull the latest app version from the
   service worker if one has been published. No backend, no key, never errors. */
async function doRefresh(){
  const rov=document.getElementById('rov'),f=document.getElementById('rovF'),st=document.getElementById('rovSt');
  rov.classList.add('open');const P=(v,t)=>{f.style.width=v+'%';st.textContent=t;};
  document.getElementById('refreshBtn').classList.add('refreshing');
  P(25,'Clearing scenarios…');
  // Reset hypotheticals back to the real results (keep saved scenarios)
  uScores={};mOrder={};advances={};ss('gsi-sc',{});ss('gsi-ord',{});ss('gsi-adv',{});activeScenario=null;
  await new Promise(r=>setTimeout(r,250));
  P(60,'Checking for updates…');
  // Ask the service worker to look for a newer published build
  let updated=false;
  try{
    if('serviceWorker'in navigator){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){await reg.update();updated=!!reg.waiting;}
    }
  }catch{}
  await new Promise(r=>setTimeout(r,250));
  P(100,'Up to date');
  setTimeout(()=>{
    rov.classList.remove('open');
    document.getElementById('refreshBtn').classList.remove('refreshing');
    renderAll();
    toast(updated?'Updated to the latest version':'Synced to latest results');
    if(updated)setTimeout(()=>location.reload(),600);
  },550);
}

/* ════ RESET ════ */
function doReset(){uScores={};mOrder={};advances={};ss('gsi-sc',{});ss('gsi-ord',{});ss('gsi-adv',{});activeScenario=null;renderAll();toast('Reset — back to real results');}

/* ════ NAV ════ */
function renderAll(){renderGroups();if(curV==='bracket')renderBracket();if(curV==='schedule'){buildChips();renderSchedule();}}
function showView(v){curV=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('[data-v]').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll(`[data-v="${v}"]`).forEach(x=>x.classList.add('active'));
  if(v==='bracket')renderBracket();
  if(v==='schedule'){buildChips();renderSchedule();}
}
document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>showView(b.dataset.v));
document.getElementById('refreshBtn').onclick=doRefresh;
document.getElementById('resetBtn').onclick=()=>{if(confirm('Clear all scenarios and picks?'))doReset();};
document.getElementById('rovCl').onclick=()=>document.getElementById('rov').classList.remove('open');
document.getElementById('srch').oninput=e=>{sQuery=e.target.value;renderSchedule();};
document.getElementById('srchX').onclick=()=>{sQuery='';document.getElementById('srch').value='';renderSchedule();};

let toastT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}

/* ── Tab swipe: only trigger when in groups/schedule views, not bracket ── */
let swX=null,swY=null;
document.getElementById('content').addEventListener('touchstart',e=>{swX=e.touches[0].clientX;swY=e.touches[0].clientY;},{passive:true});
document.getElementById('content').addEventListener('touchend',e=>{
  if(swX===null)return;
  const dx=e.changedTouches[0].clientX-swX,dy=e.changedTouches[0].clientY-swY;
  swX=null;swY=null;
  if(curV==='bracket')return; // bracket scrolls vertically — no swipe nav
  if(Math.abs(dx)<70||Math.abs(dy)>50||Math.abs(dy)>Math.abs(dx)*0.6)return;
  const order=['schedule','groups','bracket'],i=order.indexOf(curV);
  if(dx<0&&i<2)showView(order[i+1]);else if(dx>0&&i>0)showView(order[i-1]);
});

renderGroups();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
</script>
